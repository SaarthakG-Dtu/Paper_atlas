name: Update Papers

on:
  schedule:
    # Runs at 06:00 UTC on the 1st of Jan, Apr, Jul, Oct (quarterly)
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      lookback_months:
        description: 'How many months back to search (default: 4)'
        required: false
        default: '4'

permissions:
  contents: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install arxiv

      - name: Fetch new papers
        run: python scripts/fetch_papers.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet papers.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new papers found — papers.js unchanged."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "papers.js updated with new papers."
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.js
          git commit -m "chore: add new world model papers $(date +'%Y-%m-%d')"
          git push
